<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Luyện phát âm AI</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: #f0f8ff;
}

#word {
    font-size: 50px;
    margin: 20px;
}

#result {
    font-size: 28px;
    margin: 20px;
}

button {
    padding: 10px 20px;
    font-size: 18px;
    margin: 10px;
}
</style>
</head>

<body>

<h2>🎤 Luyện phát âm</h2>

<div id="word">cat</div>

<button onclick="speak()">🔊 Nghe mẫu</button>
<button onclick="start()">🎙️ Bắt đầu nói</button>
<button onclick="nextWord()">➡️ Từ tiếp theo</button>

<div id="result">Nhấn "Bắt đầu nói"</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@1.3.1/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/speech-commands@0.4.0/dist/speech-commands.min.js"></script>

<script>
// ⚠️ SỬA LINK MODEL Ở ĐÂY (đã fix lỗi của bạn)
const URL = "https://nonamee-star.github.io/ai-pronunciation/my_model/";

// danh sách từ
const words = ["cat", "dog", "chicken"];
let currentWordIndex = 0;
let recognizer;

// đọc mẫu
function speak() {
    const word = words[currentWordIndex];
    const utterance = new SpeechSynthesisUtterance(word);
    utterance.lang = "en-US";
    speechSynthesis.speak(utterance);
}

// chuyển từ
function nextWord() {
    currentWordIndex = (currentWordIndex + 1) % words.length;
    document.getElementById("word").innerText = words[currentWordIndex];
    document.getElementById("result").innerText = "Nhấn 'Bắt đầu nói'";
}

// load model
async function loadModel() {
    recognizer = speechCommands.create(
        "BROWSER_FFT",
        undefined,
        URL + "model.json",
        URL + "metadata.json"
    );

    await recognizer.ensureModelLoaded();
    console.log("Model loaded");
}

// bắt đầu nghe
async function start() {

    document.getElementById("result").innerText = "Đang nghe... 🎤";

    if (!recognizer) {
        await loadModel();
    }

    const classLabels = recognizer.wordLabels();

    recognizer.listen(result => {

        console.log("Listening...");

        const scores = result.scores;
        let maxScore = 0;
        let predictedWord = "";

        for (let i = 0; i < classLabels.length; i++) {
            if (scores[i] > maxScore) {
                maxScore = scores[i];
                predictedWord = classLabels[i];
            }
        }

        const currentWord = words[currentWordIndex];
        let resultText = "";

        if (predictedWord === currentWord) {
            if (maxScore > 0.85) {
                resultText = "✅ Đúng (" + maxScore.toFixed(2) + ")";
            } else {
                resultText = "⚠️ Gần đúng (" + maxScore.toFixed(2) + ")";
            }
        } else {
            resultText = "❌ Sai (AI nghe: " + predictedWord + ")";
        }

        document.getElementById("result").innerText = resultText;

    }, {
        probabilityThreshold: 0.75,
        overlapFactor: 0.5
    });
}
</script>

</body>
</html>
