<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Luyện phát âm AI</title>
</head>

<body style="text-align:center; font-family: Arial;">

<h1>🎤 Luyện phát âm</h1>

<h2 id="word">cat</h2>

<button onclick="start()">🎙️ Start</button>

<p id="result">Bấm Start để bắt đầu</p>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@1.3.1/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/speech-commands@0.4.0/dist/speech-commands.min.js"></script>

<script>
console.log("JS OK");

const URL = "./my_model/";

const words = ["cat", "dog", "chicken"];
let currentWordIndex = 0;
let recognizer;

async function start() {
    console.log("Start clicked");

    if (!recognizer) {
        recognizer = speechCommands.create(
            "BROWSER_FFT",
            undefined,
            URL + "model.json",
            URL + "metadata.json"
        );

        await recognizer.ensureModelLoaded();
        console.log("Model loaded");
    }

    const classLabels = recognizer.wordLabels();

    document.getElementById("result").innerText = "Đang nghe...";

    recognizer.listen(result => {

        console.log("Listening...");

        let scores = result.scores;
        let maxScore = 0;
        let predicted = "";

        for (let i = 0; i < classLabels.length; i++) {
            if (scores[i] > maxScore) {
                maxScore = scores[i];
                predicted = classLabels[i];
            }
        }

        let currentWord = words[currentWordIndex];
        let text = "";

        if (predicted === currentWord) {
            text = "✅ Đúng (" + maxScore.toFixed(2) + ")";
        } else {
            text = "❌ Sai: " + predicted;
        }

        document.getElementById("result").innerText = text;

    }, {
        probabilityThreshold: 0.75
    });
}
</script>

</body>
</html>
