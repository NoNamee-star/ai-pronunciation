<h1>HELLO TEST</h1>
<script>
const URL = "./my_model/";

const words = ["cat", "dog", "chicken"];
let currentWordIndex = 0;
let recognizer; // lưu model để không load lại

// đọc mẫu
function speak() {
    const word = words[currentWordIndex];
    const utterance = new SpeechSynthesisUtterance(word);
    utterance.lang = "en-US";
    speechSynthesis.speak(utterance);
}

// chuyển từ
function nextWord() {
    currentWordIndex = (currentWordIndex + 1) % words.length;
    document.getElementById("word").innerText = words[currentWordIndex];
    document.getElementById("result").innerText = "";
}

// load model (chỉ load 1 lần)
async function createModel() {
    const checkpointURL = URL + "model.json";
    const metadataURL = URL + "metadata.json";

    recognizer = speechCommands.create(
        "BROWSER_FFT",
        undefined,
        checkpointURL,
        metadataURL
    );

    await recognizer.ensureModelLoaded();
    console.log("Model loaded");
}

// bắt đầu nghe
async function init() {
    // nếu chưa load thì load
    if (!recognizer) {
        await createModel();
    }

    const classLabels = recognizer.wordLabels();

    recognizer.listen(result => {
        console.log("Đang nghe...");

        const scores = result.scores;
        const currentWord = words[currentWordIndex];

        let maxScore = 0;
        let predictedWord = "";

        for (let i = 0; i < classLabels.length; i++) {
            if (scores[i] > maxScore) {
                maxScore = scores[i];
                predictedWord = classLabels[i];
            }
        }

        let resultText = "";

        if (predictedWord === currentWord) {
            if (maxScore > 0.85) {
                resultText = "✅ Đúng (" + maxScore.toFixed(2) + ")";
            } else {
                resultText = "⚠️ Gần đúng (" + maxScore.toFixed(2) + ")";
            }
        } else {
            resultText = "❌ Sai (AI nghe: " + predictedWord + ")";
        }

        document.getElementById("result").innerText = resultText;

    }, {
        probabilityThreshold: 0.75,
        overlapFactor: 0.5
    });
}
</script>
